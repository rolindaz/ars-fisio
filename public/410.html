<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Alan+Sans:wght@300..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Pagina non più disponibile | Ars Fisio</title>
    <style>
      :root {
        --logo-main: #2c67a0;
        --logo-dark: #23527f;
        --page-bg: linear-gradient(
          180deg,
          rgba(247, 251, 254, 0.98) 0%,
          rgba(233, 243, 250, 0.94) 100%
        );
        --card-border: rgba(44, 103, 160, 0.12);
        --card-shadow: 0 30px 60px -40px rgba(18, 50, 80, 0.55);
        --button-shadow:
          0 10px 22px -24px rgba(18, 50, 80, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.96),
          inset 0 10px 16px -14px rgba(255, 255, 255, 0.9);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        min-height: 100vh;
        padding: 4rem 1.5rem;
        display: grid;
        place-items: center;
        font-family: "Noto Sans", sans-serif;
        background:
          radial-gradient(circle at top, rgba(120, 173, 216, 0.18), transparent 34%),
          var(--page-bg);
        color: var(--logo-dark);
      }

      .section-shell {
        width: min(100%, 56rem);
      }

      .card {
        overflow: hidden;
        border: 1px solid var(--card-border);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: var(--card-shadow);
      }

      .card-inner {
        padding: 2rem 1.5rem;
        background: linear-gradient(
          180deg,
          rgba(240, 247, 252, 0.96) 0%,
          rgba(223, 237, 247, 0.92) 100%
        );
      }

      h1 {
        margin: 0 0 1.5rem;
        font-family: "Alan Sans", sans-serif;
        font-size: clamp(2.5rem, 2.1rem + 1.2vw, 3rem);
        line-height: 1.05;
        font-weight: 700;
        color: var(--logo-dark);
      }

      p {
        margin: 0;
        max-width: 42rem;
        font-size: 1rem;
        line-height: 1.75;
      }

      p + p {
        margin-top: 0.75rem;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        margin-top: 1.75rem;
        padding: 0.9rem 1.1rem;
        border: 1px solid rgba(35, 82, 127, 0.28);
        border-radius: 999px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.98) 0%,
          rgba(247, 251, 254, 0.94) 42%,
          rgba(239, 246, 251, 0.94) 100%
        );
        box-shadow: var(--button-shadow);
        color: var(--logo-dark);
        font-size: 0.95rem;
        font-weight: 500;
        letter-spacing: 0.02em;
        line-height: 1;
        text-decoration: none;
        transition:
          transform 0.25s ease,
          box-shadow 0.25s ease,
          background 0.25s ease,
          color 0.25s ease;
      }

      .cta:hover,
      .cta:focus-visible {
        color: #fff;
        background: linear-gradient(
          180deg,
          rgba(92, 139, 180, 0.98) 0%,
          rgba(64, 109, 150, 0.98) 100%
        );
        border-color: rgba(35, 82, 127, 0.46);
        transform: translateY(-2px);
        box-shadow: 0 16px 28px -22px rgba(18, 50, 80, 0.24);
      }

      @media (max-width: 767px) {
        body {
          padding: 1.5rem 1rem;
        }

        .card {
          border-radius: 28px;
        }

        .card-inner {
          padding: 2rem 1.25rem;
        }

        p {
          font-size: 0.98rem;
          line-height: 1.65;
        }

        .cta {
          width: 100%;
        }
      }

      @media (hover: none) {
        .cta:hover,
        .cta:focus-visible {
          transform: none;
          box-shadow: var(--button-shadow);
        }
      }
    </style>
  </head>
  <body>
    <main class="section-shell">
      <div class="card">
        <div class="card-inner">
          <h1>Siamo spiacenti...</h1>
          <p>
            Il contenuto che stai cercando non è piu disponibile:
            <br>
            questa pagina è stata
            rimossa in modo permanente.
          </p>
          <p>Puoi tornare alla home page e continuare la navigazione da lì.</p>
          <a class="cta" href="/">Torna alla home</a>
        </div>
      </div>
    </main>
  </body>
</html>
